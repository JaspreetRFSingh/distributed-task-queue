# Application Configuration
spring.application.name=distributed-task-queue
server.port=8080

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskqueue}
spring.datasource.username=${DB_USERNAME:taskqueue}
spring.datasource.password=${DB_PASSWORD:taskqueue}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Task Queue Configuration
taskqueue.max-retries=3
taskqueue.retry-delay-ms=5000
taskqueue.dead-letter-enabled=true
taskqueue.scheduler.enabled=true
taskqueue.scheduler.cron=0 */1 * * * *

# Logging
logging.level.com.taskqueue=INFO
logging.level.org.springframework.amqp=WARN
